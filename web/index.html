<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d10" data-theme-color-dark="#0d0d10" data-theme-color-light="#ffffff" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>CC Manager UI</title>
    <script>
      // No-flash theme boot — must match the kit's useTheme() (storage key + resolve logic).
      (() => {
        try {
          const mode = localStorage.getItem('lunarwerx-theme') || 'dark'
          const dark = mode === 'dark' || (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          const html = document.documentElement
          html.classList.toggle('dark', dark)
          html.dataset.theme = mode
          html.style.colorScheme = dark ? 'dark' : 'light'
        } catch (_) {
          /* pre-app boot: storage/matchMedia can be blocked (privacy modes); fall back to the default theme silently, there is no UI to inform yet */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
