name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · build · test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + format (Biome)
        run: bun run lint

      # The job has been named "typecheck" since day one but never ran one, so a change could go
      # green here carrying real type errors — and one was: the portable-window exports went
      # undeclared for two commits with nothing to notice. Covers src AND every tests/ dir.
      - name: Typecheck
        run: bun run typecheck

      - name: i18n check (web)
        run: bun run --cwd web check:i18n

      # Repo guardrail (Architect custom check, run standalone, no npx/network): fails if a reka
      # popper root (DropdownMenu/Popover/etc) wraps AROUND an <IconTooltip> that contains its own
      # trigger, instead of living inside it. reka anchors to the nearest PopperRoot in the Vue
      # component tree, so the tooltip steals the anchor and the real content opens off-screen (and
      # freezes pointer events for modal poppers). See the check file's header.
      - name: Guardrail (reka popper root inside tooltip)
        run: bun .arkitect/your-checks/code/reka-popper-root-inside-tooltip.mjs

      # Fails if a WMI `CommandLine LIKE` query forgets to exclude the shell running it — that query
      # carries the needle in its own command line, so it matches itself and answers "found"
      # forever. isRunnerAlive() did exactly that for months, silently disabling the stale-pid guard.
      - name: Guardrail (self-matching WMI query)
        run: bun .arkitect/your-checks/code/wmi-commandline-query-self-match.mjs

      # Fails if a vendored server lib's runtime .mjs and its hand-maintained .d.mts disagree on
      # value exports either way: a .mjs export the .d.mts omits (TS2305 on import — exactly the
      # kit-sync that shipped RepoYeti v0.6.0 with red CI), or a .d.mts declaration the .mjs lacks
      # (tsc trusts it, so it typechecks and is `undefined` at runtime). See the check's header.
      - name: Guardrail (kit lib .mjs/.d.mts export drift)
        run: bun .arkitect/your-checks/code/kit-lib-type-drift.mjs

      # Enforces BOTH directions of the windowsHide rule in server/src.
      # Missing on a console program (powershell/cmd/taskkill/bun/node/claude/npm/wmic/reg): that
      # spawn only stays invisible because the daemon happens to be launched with a window-less
      # console (misc/Tray-Host.ps1's CreateNoWindow=true) that a console child inherits; start the
      # daemon any other way and it flashes a real console window.
      # PRESENT on a GUI program (explorer, an editor, a browser): windowsHide is libuv's hide flag,
      # which sets SW_HIDE too, and a GUI app obeys it, so the window the spawn exists to open never
      # appears while the call still succeeds. That silently broke reveal-instance-folder once.
      # See the check's header.
      - name: Guardrail (windowsHide on console spawns, never on GUI spawns)
        run: bun .arkitect/your-checks/code/spawn-console-window.mjs

      - name: Build (web SPA)
        run: bun run build

      - name: Test
        run: bun test

    # NOTE: the windows-latest leg exercises the tray's Windows -SelfTest
    # (tests/launcher.test.ts's `test.skipIf(!isWin)` cases run automatically here, skip on
    # ubuntu) and the golden crypto vectors in server/tests/instances-crypto.test.ts, which are
    # gated on BOTH platform and the presence of this machine's real credential fixture — they
    # skip gracefully on any CI runner (no fixture present) rather than failing.
    #
    # check:kit is intentionally NOT run here — it needs the private lunarwerx-ui kit repo as a
    # sibling checkout, which CI doesn't have.
