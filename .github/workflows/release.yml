# Release: compile real executables for every OS and publish them with versioned changelog notes.
#
# Trigger: pushing a version tag (v0.2.1). The release is published automatically only after every
# build and smoke job succeeds. workflow_dispatch runs build + smoke only (no release), for
# validating the pipeline without a tag.
#
# Design notes (verified 2026-07-16 against a real compiled exe on Windows):
# - `bun build --compile` cross-compiles every POSIX target (minified) from one Linux runner. The
#   windows-x64 leg runs on windows-latest UNMINIFIED: --minify alone panics Bun 1.3.14 when the
#   compile host is Windows (isolated locally; the exact same --minify is fine cross-compiling from
#   Linux). --windows-icon/--windows-title are host-gated to Windows but otherwise fine, so the
#   Windows leg applies them natively at compile time (no post-processing tool). What compiling does
#   NOT prove is that the binary RUNS — the smoke job boots each bundle on real hardware for its OS
#   and asserts /api/health, because the failure modes here (virtual import.meta.dir paths, the
#   implicit-serve entrypoint trap) all pass the build and only explode at runtime.
# - The SPA is a SIDECAR web/dist folder next to the binary, not embedded: Vite emits hashed
#   filenames unknown at compile time, and config.ts's APP_ROOT already resolves web/dist beside
#   the exe in compiled mode.
# - The Windows zip ships the misc/ tray toolkit; CCManagerUI-Tray.ps1 detects the compiled layout
#   (CCManagerUI.exe at the app root) and starts the exe instead of `bun server/src/index.ts`.
name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: compile (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # windows-x64 builds ON Windows so --windows-icon works; everything else cross-compiles
          # from one Linux runner.
          - target: windows-x64
            os: windows-latest
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-latest
          - target: darwin-x64
            os: ubuntu-latest
          - target: darwin-arm64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          PKG_V=$(bun -e 'console.log(require("./package.json").version)')
          TAG_V="${GITHUB_REF_NAME#v}"
          if [ "$PKG_V" != "$TAG_V" ]; then
            echo "tag v$TAG_V does not match package.json version $PKG_V — bump package.json (and CHANGELOG) first"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web SPA
        run: bun run --cwd web build

      - name: Compile + package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(bun -e 'console.log(require("./package.json").version)')
          target="${{ matrix.target }}"
          name="CCManagerUI-${VERSION}-${target}"
          stage="out/${name}"
          mkdir -p "${stage}/web"
          cp -R web/dist "${stage}/web/dist"
          cp LICENSE CHANGELOG.md "${stage}/"
          cp .github/RELEASE-README.md "${stage}/README.md"
          if [ "$target" = "windows-x64" ]; then
            # NO --minify: on a WINDOWS compile host --minify alone panics Bun 1.3.14 outright
            # ("Crashed while printing main.ts" — isolated locally 2026-07-16 to --minify specifically;
            # --windows-icon/--windows-title are innocent, they only appeared guilty when paired with
            # --minify, and the same --minify works fine on the Linux legs). The native Windows
            # resource flags DO work on a Windows host (they're only unavailable when cross-compiling
            # from Linux), so the icon + title are applied at compile time — no rcedit post-step.
            # Unminified costs a few MB.
            bun build --compile --sourcemap=none --target="bun-${target}" \
              --windows-icon=misc/CCManagerUI.ico --windows-title="CC Manager UI" \
              --outfile="${stage}/CCManagerUI.exe" server/src/main.ts
            "${stage}/CCManagerUI.exe" --version   # canary: the compiled exe runs
            mkdir -p "${stage}/misc"
            cp misc/CCManagerUI-Tray.ps1 misc/Tray-Host.ps1 misc/Tray-Launch.vbs \
               misc/New-TrayShortcut.ps1 misc/CCManagerUI.ico "${stage}/misc/"
            # windows-latest has 7z on PATH; git-bash there has no `zip`
            (cd out && 7z a -tzip "${name}.zip" "${name}" > /dev/null)
          else
            bun build --compile --minify --sourcemap=none --target="bun-${target}" \
              --outfile="${stage}/ccmanagerui" server/src/main.ts
            tar -C out -czf "out/${name}.tar.gz" "${name}"
          fi
          rm -rf "${stage}"
          ls -la out

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            out/*.zip
            out/*.tar.gz
          if-no-files-found: error
          # These are large binaries only consumed by the smoke + release jobs in THIS run
          # (or nobody, on a workflow_dispatch validation run). No reason to keep them 90 days.
          retention-days: 3

  # Boot each bundle and assert --version + /api/health + served SPA. This catches the
  # compiled-only runtime bugs a green compile can't (virtual import.meta.dir paths, the
  # implicit-serve trap). Native runners for x64 Linux / Windows / arm64 macOS; linux-arm64 is
  # booted under QEMU on the x64 runner (no free native ARM-Linux runner). darwin-x64 (Intel mac)
  # is the ONE target that stays build-only-verified: GitHub retired its Intel macOS runners, so
  # there is no honest way to boot it in CI — a documented, deliberate gap, not a silent one.
  smoke:
    name: smoke (${{ matrix.target }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bin: ccmanagerui
          - os: ubuntu-latest
            target: linux-arm64
            bin: ccmanagerui
            qemu: true
          - os: windows-latest
            target: windows-x64
            bin: CCManagerUI.exe
          - os: macos-latest # arm64 runner
            target: darwin-arm64
            bin: ccmanagerui
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-${{ matrix.target }}
          path: out

      # linux-arm64 runs inside an arm64 container via binfmt/QEMU emulation on the x64 runner.
      - name: Set up QEMU (arm64 emulation)
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Unpack the bundle
        shell: bash
        run: |
          cd out
          bundle=$(ls CCManagerUI-*-${{ matrix.target }}.* | head -1)
          echo "smoking $bundle"
          case "$bundle" in
            *.zip) unzip -q "$bundle" ;;
            *) tar -xzf "$bundle" ;;
          esac
          dir="${bundle%.zip}"; dir="${dir%.tar.gz}"
          echo "BUNDLE_DIR=out/$dir" >> "$GITHUB_ENV"

      # The actual boot+assert, factored so native and QEMU paths run identical checks.
      - name: Boot + assert (native)
        if: '!matrix.qemu'
        shell: bash
        env:
          BIN: ${{ matrix.bin }}
        run: |
          cd "$BUNDLE_DIR"
          chmod +x "$BIN" 2>/dev/null || true
          "./$BIN" --version
          export CCMANAGERUI_HOME="$RUNNER_TEMP/ccm-smoke-home"
          PORT=7797 "./$BIN" > daemon.out 2>&1 &
          ok=""
          for _ in $(seq 1 40); do
            if curl -sf http://127.0.0.1:7797/api/health > health.json 2>/dev/null; then ok=1; break; fi
            sleep 0.5
          done
          if [ -z "$ok" ]; then echo "daemon never served /api/health"; cat daemon.out; exit 1; fi
          cat health.json; echo
          grep -q '"service":"ccmanagerui"' health.json
          grep -q '"distribution":"compiled"' health.json
          curl -sf http://127.0.0.1:7797/ | grep -qi '<!doctype html'

      - name: Boot + assert (arm64 under QEMU)
        if: matrix.qemu
        shell: bash
        run: |
          # arm64 Debian container (binfmt routes it through QEMU). --version proves the emulated
          # binary at least loads + runs; a full daemon boot under QEMU is slow/flaky, so the arm64
          # leg asserts the launch, and the native x64 leg covers the serving behavior.
          docker run --rm --platform linux/arm64 -v "$PWD/$BUNDLE_DIR:/app" -w /app \
            arm64v8/debian:stable-slim ./ccmanagerui --version

  release:
    name: publish the GitHub release
    if: github.ref_type == 'tag'
    needs: [build, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            index($0, "## [" version "]") == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if ! grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            echo "::error::CHANGELOG.md has no release section for ${GITHUB_REF_NAME}"
            exit 1
          fi

      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: out

      # Idempotent: a retry updates the existing release in place and replaces its platform assets
      # instead of deleting the release or creating an orphaned draft.
      - name: Publish release with binaries attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" out/*.zip out/*.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "CC Manager UI ${GITHUB_REF_NAME#v}" \
              --notes-file RELEASE_NOTES.md \
              --draft=false
          else
            gh release create "$GITHUB_REF_NAME" out/*.zip out/*.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --title "CC Manager UI ${GITHUB_REF_NAME#v}" \
              --notes-file RELEASE_NOTES.md
          fi
